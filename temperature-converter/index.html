    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Temperature Converter 🌡️</h2>

    <option value="fahrenheit">Fahrenheit to Celsius</option>

<button onclick="convert()">Convert</button>

</body>
